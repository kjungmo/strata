name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  core-tests:
    name: core unit tests (no ROS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake g++ libeigen3-dev libgtest-dev

      - name: strata_core — build & test
        run: |
          cmake -S strata_core -B build/core -DSTRATA_CORE_BUILD_TESTS=ON
          cmake --build build/core -j
          ( cd build/core && ctest --output-on-failure )
