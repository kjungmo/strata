/**:
  ros__parameters:
    backend: "grid2d"
    global_frame: "map"
    scan_topic: "/scan"
    publish_period: 1.0
    save_path: "/tmp/prism_map_2d"
    grid_width: 400
    grid_height: 400
    grid_resolution: 0.05
    grid_origin_x: -10.0
    grid_origin_y: -10.0
    layer_interval: 10
    l_hit: 0.85
    l_miss: -0.4
    l_min: -5.0
    l_max: 5.0
    survival_decay: 0.97
    graduate_prob: 0.8
    demote_prob: 0.45
    min_observations: 3
    prune_prob: 0.05
    enable_periodicity: true
    periodic_amplitude_min: 0.3
    period_windows: 24
    n_harmonics: 2
